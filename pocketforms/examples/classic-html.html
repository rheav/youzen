<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PocketForms — classic example</title>
    <style>
      body {
        font: 16px/1.5 system-ui, sans-serif;
        max-width: 480px;
        margin: 4rem auto;
        padding: 0 1.5rem;
        color: #292524;
      }
      h1 { font-weight: 500; letter-spacing: -0.02em; }
      label { display: block; margin-top: 1rem; font-size: 14px; color: #57534e; }
      input, textarea {
        width: 100%;
        padding: 0.6rem 0.8rem;
        border: 1px solid #e7e5e4;
        border-radius: 8px;
        font: inherit;
      }
      button {
        margin-top: 1.25rem;
        padding: 0.7rem 1.2rem;
        border: 0;
        border-radius: 999px;
        background: #7fa87f;
        color: white;
        font-weight: 500;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Send us a note</h1>

    <!--
      Classic mode = zero JavaScript required. The browser POSTs the form
      natively to PocketBase, which responds with a 303 redirect to either
      the form's `redirect` config or this page's `_pf_redirect` override.

      The SDK is still included so it can inject the honeypot and
      time-trap fields automatically. If you can't include any JS at all,
      add those fields by hand:

        <input type="text" name="_pf_honey"
               style="display:none" tabindex="-1" autocomplete="off">
        <input type="hidden" name="_pf_t" value="0">

      …and the server will simply skip the time-trap when `_pf_t` is 0
      (it will not, because the value defaults to "0" which is < minTime;
      so for fully no-JS forms, raise `minTimeMs` to 0 in the form
      record). The honeypot still works fine without JS.
    -->
    <form
      data-pocketforms="contact"
      data-pocketforms-mode="classic"
      data-pocketforms-redirect="https://yoursite.example/thanks.html"
      action="https://pb.example.com/api/pf/submit/contact"
      method="POST"
      enctype="multipart/form-data"
    >
      <label>
        Your email
        <input type="email" name="email" required />
      </label>
      <label>
        What's on your mind?
        <textarea name="message" rows="5" required></textarea>
      </label>

      <!-- Optional FormSubmit-style overrides (must be allowed by the
           form record's allowedOrigins): -->
      <input type="hidden" name="_pf_subject" value="New contact: youZen site" />
      <input type="hidden" name="_pf_next" value="https://yoursite.example/thanks.html" />

      <button type="submit">Send</button>
    </form>

    <script
      src="../dist/pocketforms.iife.js"
      data-pocketbase-url="https://pb.example.com"
    ></script>
  </body>
</html>
