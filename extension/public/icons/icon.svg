<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="youZen leaf">
  <title>youZen</title>
  <desc>Sage rounded-square with a soft white leaf, the youZen brand mark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C6D8A9" />
      <stop offset="100%" stop-color="#A8C9A0" />
    </linearGradient>
  </defs>

  <!-- Rounded-square sage background -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bg)" />

  <!-- Leaf silhouette, scaled from the canonical 24×24 path. Single
       solid fill for max legibility at 16×16. -->
  <g transform="translate(64 64) rotate(-20) scale(3.9) translate(-12 -12)">
    <path
      d="M12 2C8 2 4 5 4 11c0 4 2 7 5 9 1-4 3-7 6-9-2 3-3 6-4 9 4-1 8-4 9-10 0-5-4-8-8-8z"
      fill="#FDFCF8"
    />
  </g>
</svg>
